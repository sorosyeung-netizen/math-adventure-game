<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超級英雄卡片對決 (Super Hero Card Battle)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="effects.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <button class="home-btn" onclick="location.href='../index.html'">🏠</button>

        <!-- Hero Selection Screen -->
        <div id="hero-selection-overlay" class="overlay">
            <div class="overlay-content hero-selection-content">
                <div class="hero-grid" id="hero-grid"></div>
                <button id="start-game-btn" class="start-btn">開始戰鬥！</button>
            </div>
        </div>

        <header>
            <h1>超級英雄卡片對決</h1>
            <div class="score-board">
                <span id="score-text">得分: 0</span>
                <span id="round-text">回合: 1</span>
            </div>
        </header>

        <main>
            <div class="battle-arena">
                <div class="card player-card" id="player-card">
                    <div class="card-image">
                        <img id="player-hero-img" src="images/spider.jpg" alt="Player Hero">
                    </div>
                    <div class="card-name" id="player-name">Spider Man</div>
                    <div class="card-hp">
                        <div class="hp-bar">
                            <div class="hp-fill" id="player-hp-fill"></div>
                        </div>
                        <span class="hp-text" id="player-hp">100</span>
                    </div>
                    <div class="attack-effect" id="player-attack-effect"></div>
                </div>

                <div class="versus-area">
                    <div class="question-area" id="question-area">
                        <div class="question-text" id="question-text">3 + 2 = ?</div>
                        <div class="visual-hint" id="visual-hint"></div>
                    </div>
                    <button id="speak-btn" aria-label="朗讀題目">🔊 聽題目</button>
                </div>

                <div class="card computer-card" id="computer-card">
                    <div class="card-image">
                        <img id="computer-hero-img" src="images/iron.jpg" alt="Computer Hero">
                    </div>
                    <div class="card-name" id="computer-name">Iron Man</div>
                    <div class="card-hp">
                        <div class="hp-bar">
                            <div class="hp-fill" id="computer-hp-fill"></div>
                        </div>
                        <span class="hp-text" id="computer-hp">100</span>
                    </div>
                    <div class="damage-effect" id="damage-effect"></div>
                </div>
            </div>

            <div class="options-area" id="options-area"></div>

            <div class="feedback-area" id="feedback-area"></div>
        </main>

        <footer>
            <button id="change-hero-btn">更換英雄</button>
            <button id="reset-btn">重新開始</button>
        </footer>
    </div>

    <div id="attack-animation-overlay"></div>

    <script src="script.js"></script>
</body>
</html>
